<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Control Panel</title>
    <!-- Tailwind CSS for Premium UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: 'rgba(30, 41, 59, 0.7)'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darker text-slate-200 min-h-screen font-sans selection:bg-primary selection:text-white flex flex-col">
    <!-- Header -->
    <header class="bg-dark border-b border-slate-800 p-6 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">CG Control Pro</h1>
                <p class="text-xs text-slate-400 font-medium">Broadcast Graphics Engine</p>
            </div>
        </div>
        <div class="flex gap-4">
            <a href="output.html" target="_blank" class="px-5 py-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all font-medium text-sm flex items-center gap-2 text-slate-200 hover:text-white hover:border-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                Open Output
            </a>
            <button id="reset-db-btn" class="px-5 py-2.5 rounded-lg bg-red-900/40 hover:bg-red-900/60 border border-red-800/50 text-red-300 transition-all font-medium text-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reload DB
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
        <div id="loading" class="flex flex-col items-center justify-center py-20 opacity-100 transition-opacity duration-500">
            <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-medium">Loading Graphics Engine...</p>
        </div>

        <!-- Graphics List -->
        <div id="graphics-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hidden opacity-0 transition-opacity duration-700">
            <!-- Graphics cards injected here by JS -->
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
