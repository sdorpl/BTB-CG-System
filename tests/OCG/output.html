<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wizja - Output 1920x1080 (Green Screen)</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            width: 1920px; 
            height: 1080px; 
            overflow: hidden; 
            /* Klasyczny Green Screen do Chroma Key */
            background-color: #004052; 
        }
        
        #cg-layer { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
        }
        
        .template-wrapper { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="cg-layer"></div>

    <script>
        const channel = new BroadcastChannel('tv_engine');
        const mainLayer = document.getElementById('cg-layer');

        channel.onmessage = (e) => {
            const data = e.data;
            const tplId = data.id;

            if (data.cmd === 'play') {
                const oldWrapper = document.getElementById('wrap-' + tplId);
                if (oldWrapper) oldWrapper.remove();
                const oldStyle = document.getElementById('style-' + tplId);
                if (oldStyle) oldStyle.remove();
                const oldScript = document.getElementById('script-' + tplId);
                if (oldScript) oldScript.remove();

                const style = document.createElement('style');
                style.id = 'style-' + tplId;
                style.innerHTML = data.css;
                document.head.appendChild(style);

                const wrapper = document.createElement('div');
                wrapper.id = 'wrap-' + tplId;
                wrapper.className = 'template-wrapper';
                wrapper.innerHTML = data.html;
                mainLayer.appendChild(wrapper);

                for (const key in data.fields) {
                    const el = wrapper.querySelector('#' + key);
                    if (el) el.innerHTML = data.fields[key];
                }

                if (data.js && data.js.trim() !== '') {
                    const script = document.createElement('script');
                    script.id = 'script-' + tplId;
                    script.textContent = data.js.replace(/{{DOM_CONTEXT}}/g, "document.getElementById('wrap-" + tplId + "')");
                    document.body.appendChild(script);
                }

                setTimeout(() => {
                    const firstChild = wrapper.firstElementChild;
                    if(firstChild) firstChild.classList.add('active');
                    wrapper.classList.add('active');
                }, 50);

            } else if (data.cmd === 'stop') {
                const wrapper = document.getElementById('wrap-' + tplId);
                if (wrapper) {
                    const firstChild = wrapper.firstElementChild;
                    if(firstChild) firstChild.classList.remove('active');
                    wrapper.classList.remove('active');
                    
                    setTimeout(() => {
                        wrapper.remove();
                        const s = document.getElementById('style-' + tplId); if(s) s.remove();
                        const j = document.getElementById('script-' + tplId); if(j) j.remove();
                    }, 1000);
                }
            } else if (data.cmd === 'stop_all') {
                document.querySelectorAll('.template-wrapper').forEach(wrapper => {
                    const firstChild = wrapper.firstElementChild;
                    if(firstChild) firstChild.classList.remove('active');
                    wrapper.classList.remove('active');
                });

                setTimeout(() => {
                    mainLayer.innerHTML = '';
                    document.querySelectorAll('style[id^="style-"]').forEach(e => e.remove());
                    document.querySelectorAll('script[id^="script-"]').forEach(e => e.remove());
                }, 1000);
            }
        };
    </script>
</body>
</html>
