<!DOCTYPE html>
<html>
<style>
  .v2 { display: flex; align-items: stretch; min-height: 60px; background: #222; position: relative; }
  .wiper { position: absolute; left: 0; top: 0; bottom: 0; width: 150px; background: red; z-index: 100; }
  .panel-single { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; border: 1px solid blue; }
  .msg-box { 
      padding-left: 170px; padding-top: 5px; padding-bottom: 5px; 
      color: white; font-size: 30px; line-height: 1; 
      /* No absolute positioning */
  }
</style>
<body>
<div class="v2">
  <div class="wiper">WIPER</div>
  <div class="panel-single">
    <div class="msg-box">TESTING MESSAGE</div>
  </div>
</div>
</body>
</html>
