<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BTB CG System — Połącz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    background-image:
      radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.15) 0px, transparent 50%);
    color: #e2e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── Background grid (dot pattern) ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: radial-gradient(#333 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* ── Title bar ── */
  .titlebar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    height: 32px;
    flex-shrink: 0;
    -webkit-app-region: drag;
    padding: 0 4px;
  }
  .titlebar-btn {
    -webkit-app-region: no-drag;
    width: 36px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: #6b7280;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.12s, color 0.12s;
    padding: 0;
    font-size: 0;
  }
  .titlebar-btn:hover { background: rgba(255, 255, 255, 0.05); color: #e2e8f0; }
  .titlebar-btn.close:hover { background: #dc2626; color: #fff; }
  .titlebar-btn svg { width: 16px; height: 16px; }

  /* ── Content ── */
  .content-area {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
  }
  .container {
    width: 400px;
    text-align: center;
    -webkit-app-region: no-drag;
    padding: 0 10px;
  }

  /* ── Logo ── */
  .logo {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #94a3b8);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  /* ── Glass sections ── */
  .section {
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .section:hover {
    border-color: rgba(255, 255, 255, 0.1);
    background: rgba(15, 23, 42, 0.6);
  }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    color: #ffffff;
  }
  .section-desc {
    font-size: 10px;
    color: #6b7280;
    margin-bottom: 14px;
    font-weight: 500;
  }

  /* ── Buttons ── */
  button {
    cursor: pointer;
    border-radius: 6px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 10px 24px;
    transition: all 0.15s;
    outline: none;
  }
  .btn-primary {
    background: #2563eb;
    color: white;
    width: 100%;
    border: 1px solid #3b82f6;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }
  .btn-primary:hover {
    background: #3b82f6;
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: rgba(31, 41, 55, 0.6);
    color: #e2e8f0;
    width: 100%;
    border: 1px solid #374151;
  }
  .btn-secondary:hover {
    background: rgba(55, 65, 81, 0.6);
    border-color: #4b5563;
  }
  .btn-secondary:active { transform: scale(0.97); }
  .btn-secondary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Input ── */
  input[type="text"] {
    width: 100%;
    min-width: 0;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 11px;
    font-family: 'Inter', monospace, system-ui;
    font-weight: 500;
    color: #ffffff;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
  }
  input[type="text"]::placeholder { color: #4b5563; }

  /* ── Error ── */
  .error {
    color: #ef4444;
    font-size: 10px;
    font-weight: 600;
    margin-top: 6px;
    min-height: 16px;
  }

  /* ── Section icon ── */
  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  .section-icon svg { width: 14px; height: 14px; }
  .section-icon.local {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    color: #60a5fa;
  }
  .section-icon.remote {
    background: rgba(168, 85, 247, 0.1);
    border: 1px solid rgba(168, 85, 247, 0.2);
    color: #c084fc;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="titlebar">
    <button class="titlebar-btn" id="btn-minimize" title="Minimalizuj">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="8" x2="13" y2="8"/></svg>
    </button>
    <button class="titlebar-btn close" id="btn-close" title="Zamknij">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
    </button>
  </div>
  <div class="content-area">
  <div class="container">
    <div class="logo">BTB CG System</div>
    <p class="subtitle">Wybierz tryb połączenia</p>

    <div class="section">
      <div class="section-icon local">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="8" rx="1.5"/><line x1="5" y1="14" x2="11" y2="14"/><line x1="8" y1="11" x2="8" y2="14"/></svg>
      </div>
      <div class="section-title">Serwer lokalny</div>
      <div class="section-desc">Uruchom wbudowany serwer na tym komputerze</div>
      <button class="btn-primary" id="btn-local">Uruchom lokalnie</button>
    </div>

    <div class="section">
      <div class="section-icon remote">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><ellipse cx="8" cy="8" rx="2.5" ry="6"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      </div>
      <div class="section-title">Serwer zdalny</div>
      <div class="section-desc">Połącz się z serwerem działającym w sieci</div>
      <input type="text" id="remote-url" placeholder="http://192.168.1.100:3000" spellcheck="false" autocomplete="off">
      <button class="btn-secondary" id="btn-remote" disabled>Połącz</button>
      <div class="error" id="error-msg"></div>
    </div>
  </div>

  </div><!-- /content-area -->
  <script>
    document.getElementById('btn-minimize').addEventListener('click', () => window.connectAPI.minimize());
    document.getElementById('btn-close').addEventListener('click', () => window.connectAPI.close());

    const btnLocal = document.getElementById('btn-local');
    const btnRemote = document.getElementById('btn-remote');
    const remoteInput = document.getElementById('remote-url');
    const errorMsg = document.getElementById('error-msg');

    // Populate last used remote URL
    window.connectAPI.onInitConfig((config) => {
      if (config.lastRemoteUrl) {
        remoteInput.value = config.lastRemoteUrl;
        btnRemote.disabled = false;
      }
    });

    // Enable/disable connect button based on input
    remoteInput.addEventListener('input', () => {
      btnRemote.disabled = !remoteInput.value.trim();
      errorMsg.textContent = '';
    });

    // Enter key in input triggers connect
    remoteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btnRemote.disabled) {
        btnRemote.click();
      }
    });

    btnLocal.addEventListener('click', () => {
      btnLocal.disabled = true;
      btnLocal.textContent = 'Uruchamianie…';
      window.connectAPI.connectLocal();
    });

    btnRemote.addEventListener('click', () => {
      let url = remoteInput.value.trim();
      if (!url) return;

      // Basic URL validation
      try {
        if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
        const parsed = new URL(url);
        if (!parsed.hostname) throw new Error('No hostname');
        url = parsed.origin; // normalize
      } catch {
        errorMsg.textContent = 'Nieprawidłowy adres URL';
        return;
      }

      errorMsg.textContent = '';
      btnRemote.disabled = true;
      btnRemote.textContent = 'Łączenie…';
      window.connectAPI.connectRemote(url);
    });
  </script>
</body>
</html>
