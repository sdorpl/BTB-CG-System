<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BTB CG System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #020617;
    background-image:
      radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.15) 0px, transparent 50%);
    color: #e2e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }

  .splash {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 0 24px;
  }

  /* ── App icon ── */
  .app-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .app-icon img { width: 100%; height: 100%; display: block; }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    color: #ffffff;
  }

  .subtitle {
    font-size: 9px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 32px;
  }

  /* ── Progress bar ── */
  .progress-track {
    width: 200px;
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 3px;
    margin: 0 auto 14px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .status {
    font-size: 10px;
    color: #64748b;
    font-weight: 500;
    min-height: 16px;
    transition: opacity 0.3s;
  }

  .version {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font-size: 9px;
    color: #334155;
    font-weight: 500;
  }

  /* ── Background grid ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: radial-gradient(#333 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.2;
  }

  /* ── Glow ── */
  .glow {
    position: fixed;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.08), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>

  <div class="splash">
    <div class="app-icon"><img src="icon.svg" alt="CG"></div>
    <h1>BTB CG System</h1>
    <p class="subtitle">Character Generator</p>
    <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
    <p class="status" id="status">Inicjalizacja…</p>
  </div>

  <span class="version" id="ver"></span>

  <script>
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');

    const stages = [
      [10, 'Ładowanie modułów…'],
      [30, 'Łączenie z bazą danych…'],
      [55, 'Synchronizacja szablonów…'],
      [75, 'Uruchamianie serwera…'],
      [90, 'Prawie gotowe…'],
    ];

    let i = 0;
    function nextStage() {
      if (i >= stages.length) return;
      const [pct, msg] = stages[i++];
      bar.style.width = pct + '%';
      status.textContent = msg;
      setTimeout(nextStage, 600 + Math.random() * 400);
    }
    nextStage();

    // Called from main process when server is ready
    window.__splashReady = function() {
      bar.style.width = '100%';
      status.textContent = 'Uruchamianie…';
    };
  </script>
</body>
</html>
